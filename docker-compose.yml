services:
  node:
    # build: .
    image: xpu-perf-weekly:latest
    container_name: yupengzh-xpu-perf
    entrypoint: []
    stdin_open: true
    tty: true
    environment:
      - http_proxy=http://proxy-ir.intel.com:911
      - https_proxy=http://proxy-ir.intel.com:912
      - no_proxy=localhost,127.0.0.1
      - HTTP_PROXY=http://proxy-ir.intel.com:911
      - HTTPS_PROXY=http://proxy-ir.intel.com:912
      - NO_PROXY=localhost,127.0.0.1
      - TZ=Asia/Shanghai
    command: /bin/bash
    volumes:
      - /mnt:/mnt
      - /dev/dri:/dev/dri
      - .:/workspace/xpu_weekly_report
    devices:
      - /dev/dri:/dev/dri
    network_mode: host
    working_dir: /workspace/xpu_weekly_report
    security_opt:
      - label=disable
    privileged: true
    ipc: host
    ulimits:
      memlock:
        soft: -1
        hard: -1
