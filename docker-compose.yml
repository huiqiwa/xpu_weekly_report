name: 2025.3.1
services:
  node:
    # build: .
    image: xpu-perf-weekly:2025.3.1
    container_name: huiqi-xpu-perf-2025.3.1
    entrypoint: []
    stdin_open: true
    tty: true
    environment:
      - http_proxy=http://proxy-ir.intel.com:911
      - https_proxy=http://proxy-ir.intel.com:912
      - no_proxy=localhost,127.0.0.1
      - HTTP_PROXY=http://proxy-ir.intel.com:911
      - HTTPS_PROXY=http://proxy-ir.intel.com:912
      - NO_PROXY=localhost,127.0.0.1
      - TZ=Asia/Shanghai
      - CCACHE_NOHASHDIR=1
      - CCACHE_COMPILERCHECK=content
    command: /bin/bash
    volumes:
      - /mnt:/mnt
      - /dev/dri:/dev/dri
      - ..:/workspace
      - ${HOME}/.cache/ccache:/root/.cache/ccache
    devices:
      - /dev/dri:/dev/dri
    network_mode: host
    working_dir: /workspace/xpu_weekly_report
    security_opt:
      - label=disable
    privileged: true
    ipc: host
    ulimits:
      memlock:
        soft: -1
        hard: -1
